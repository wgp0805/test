spring:
  profiles:
    active: dev
  application:
    name: blog
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: 8080
  servlet:
    context-path: /

blog:
  jwt:
    # 生产用环境变量覆盖；开发用固定串便于测试；HS256 要求 ≥ 32 字节
    secret: ${JWT_SECRET:dev-secret-please-change-in-prod-0123456789abcdef}
    expire-seconds: 7200
    issuer: blog
